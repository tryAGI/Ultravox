          description: ''
    post:
      operationId: voices_create
      description: Create a new cloned voice from an audio sample. The created voice
        will be private to your account.
      tags:
      - voices
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: An audio file containing a sample of the voice to clone.
                name:
                  type: string
                  description: Name for the cloned voice. Must be unique within your
                    account.
                  example: My Custom Voice
                description:
                  type: string
                  description: Optional description for the voice. If not provided,
                    a default description will be generated.
                  example: Voice recorded on Jan 1, 2024
                language:
                  type: string
                  description: BCP47 language code for the language used in the recording.
                  example: en-US
                  default: en
              required:
              - file
              - name
          application/json:
            schema:
              $ref: '#/components/schemas/Voice'
      security:
      - apiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voice'
          description: ''
      x-codeSamples:
      - lang: curl
        source: |-
          curl --request POST \
          --url https://api.ultravox.ai/api/voices \
          --header 'Content-Type: multipart/form-data' \
          --header 'X-API-Key: <your-api-key>' \
          --form 'file=@/path/to/voice.mp3' \
          --form 'name=My Custom Voice' \
          --form 'description=Voice recorded on Jan 1, 2024'
      - lang: curl
        source: |-
          curl --request POST \
          --url https://api.ultravox.ai/api/voices \
          --header 'Content-Type: application/json' \
          --header 'X-API-Key: <your-api-key>' \
          -d '{"name": "My Custom Voice", "description": "Example ElevenLabs voice", "definition": {"elevenLabs": {"voiceId": "21m00Tcm4TlvDq8ikWAM", "model": "eleven_turbo_v2_5"}} }'
