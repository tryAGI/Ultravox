  /api/tools:
    get:
      operationId: tools_list
      description: List tools available to your account.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: ownership
        schema:
          enum:
          - private
          - public
          type: string
          minLength: 1
        description: |-
          The ownership used to filter results.

          * `private` - Only private tools
          * `public` - Only public tools
      - name: pageSize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
        description: The search string used to filter results.
      - in: query
        name: sortOrder
        schema:
          enum:
          - display
          - alphabetic
          - reverseAlphabetic
          - chronologic
          - reverseChronologic
          - default
          type: string
          default: default
          minLength: 1
        description: |-
          How results should be ordered. If a cursor is provided, this parameter must match the sortOrder used in the previous request for results to be sensible.

          * `display` - Display order. Public tools by name first, then private tools with most recent first.
          * `alphabetic` - Name ascending
          * `reverseAlphabetic` - Name descending
          * `chronologic` - Creation order with oldest first.
          * `reverseChronologic` - Creation order with newest first.
          * `default` - Default ordering. Same as reverseChronologic but with private tools first.
      tags:
      - tools
      security:
      - apiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedToolList'
          description: ''
    post:
      operationId: tools_create
      tags:
      - tools
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tool'
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: An OpenAPI schema file in either JSON or YAML format.
              required:
              - file
      security:
      - apiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
          description: ''
