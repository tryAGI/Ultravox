        recordingEnabled:
          type: boolean
          default: false
        retentionPolicy:
          nullable: true
          description: |-
            The retention policy for the call's data after it ends.

            * `retain` - Retain indefinitely
            * `auto_delete` - Auto-delete after billing
          oneOf:
          - $ref: '#/components/schemas/RetentionPolicyEnum'
          - $ref: '#/components/schemas/NullEnum'
        systemPrompt:
          type: string
          nullable: true
        temperature:
          type: number
          format: double
          maximum: 1.0
          minimum: 0.0
          default: 0.0
        timeExceededMessage:
          type: string
          nullable: true
        voice:
          type: string
          nullable: true
        externalVoice:
          $ref: '#/components/schemas/ultravox.v1.ExternalVoice'
        voiceOverrides:
          allOf:
