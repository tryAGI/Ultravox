            type: string
            description: |-
              * `lmnt` - LMNT
              * `cartesia` - Cartesia
              * `google` - Google
              * `respeecher` - Respeecher
              * `eleven_labs` - Eleven Labs
              * `inworld` - Inworld
        description: The providers used to filter results.
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
